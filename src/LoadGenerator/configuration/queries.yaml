- id: bcda494f685aa0d8ff63f6661d6bb60f
  query: |
    query CartPopoverQuery {
      viewer {
        cart {
          ...CartPopover_cart
          id
        }
      }
    }

    fragment CartItem_item on CartItem {
      id
      quantity
      addedAt
      product {
        id
        name
        price
        pictureUrl
      }
    }

    fragment CartPopover_cart on Cart {
      id
      items {
        nodes {
          id
          ...CartItem_item
        }
      }
    }
  weight: 100

- id: f1a216fa82107e781221cbecd539efd2
  query: |
    query ProductsPageQuery(
      $count: Int!
      $cursor: String
    ) {
      ...ProductsList_products_1G22uz
    }

    fragment ProductCard_product on Product {
      id
      name
      price
      pictureUrl
    }

    fragment ProductsList_products_1G22uz on Query {
      products(first: $count, after: $cursor) {
        edges {
          node {
            id
            ...ProductCard_product
            __typename
          }
          cursor
        }
        pageInfo {
          endCursor
          hasNextPage
        }
      }
    }
