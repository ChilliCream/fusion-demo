schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}

type Query {
  inventoryItemById(id: ID!): InventoryItem
    @cost(weight: "10")
  node(id: ID!): Node
  orderById(id: ID!): Order
    @cost(weight: "10")
  paymentById(id: ID!): Payment
    @cost(weight: "10")
  productById(id: ID!): Product
    @cost(weight: "10")
  products("Returns the elements in the list that come after the specified cursor." after: String "Returns the elements in the list that come before the specified cursor." before: String "Returns the first _n_ elements from the list." first: Int "Returns the last _n_ elements from the list." last: Int maxPrice: Float minPrice: Float searchText: String): ProductsConnection
    @cost(weight: "10")
  reviewById(id: ID!): Review
    @cost(weight: "10")
  userById(id: ID!): User
    @cost(weight: "10")
  userByUsername(username: String!): User
    @cost(weight: "10")
  users("Returns the elements in the list that come after the specified cursor." after: String "Returns the elements in the list that come before the specified cursor." before: String "Returns the first _n_ elements from the list." first: Int "Returns the last _n_ elements from the list." last: Int): UsersConnection
    @cost(weight: "10")
  viewer: Viewer!
}

type Mutation {
  addProductToCart(input: AddProductToCartInput!): AddProductToCartPayload!
    @cost(weight: "10")
  checkout: CheckoutPayload!
    @cost(weight: "10")
  createOrder(input: CreateOrderInput!): CreateOrderPayload!
    @cost(weight: "10")
  createPayment(input: CreatePaymentInput!): CreatePaymentPayload!
    @cost(weight: "10")
  createReview(input: CreateReviewInput!): CreateReviewPayload!
    @cost(weight: "10")
  removeProductFromCart(input: RemoveProductFromCartInput!): RemoveProductFromCartPayload!
    @cost(weight: "10")
  restockProduct(input: RestockProductInput!): RestockProductPayload!
    @cost(weight: "10")
  uploadProductPicture(input: UploadProductPictureInput!): UploadProductPicturePayload!
    @cost(weight: "10")
}

type Subscription {
  onCreateReview: Review
    @cost(weight: "10")
}

type AddProductToCartPayload {
  cart: Cart
  errors: [AddProductToCartError!]
}

type Cart {
  createdAt: DateTime!
  id: ID!
  items("Returns the elements in the list that come after the specified cursor." after: String "Returns the elements in the list that come before the specified cursor." before: String "Returns the first _n_ elements from the list." first: Int "Returns the last _n_ elements from the list." last: Int): CartItemsConnection
    @cost(weight: "10")
}

type CartItem {
  addedAt: DateTime!
  id: ID!
  product: Product!
  quantity: Int!
}

"A connection to a list of items."
type CartItemsConnection {
  "A list of edges."
  edges: [CartItemsEdge!]
  "A flattened list of the nodes."
  nodes: [CartItem!]
  "Information to aid in pagination."
  pageInfo: PageInfo!
}

"An edge in a connection."
type CartItemsEdge {
  "A cursor for use in pagination."
  cursor: String!
  "The item at the end of the edge."
  node: CartItem!
}

type CheckoutPayload {
  cart: Cart
}

type CreateOrderPayload {
  order: Order
}

type CreatePaymentPayload {
  payment: Payment
}

type CreateReviewPayload {
  review: Review
}

type InventoryItem implements Node {
  id: ID!
  product: Product!
  quantity: Int!
}

type Order implements Node {
  id: ID!
  items: [OrderItem!]!
  payments: [Payment!]!
    @cost(weight: "10")
  user: User!
  weight: Int!
}

type OrderItem {
  id: Int!
  order: Order
  orderId: Int!
  price: Float!
  product: Product!
  quantity: Int!
}

"Information about pagination in a connection."
type PageInfo {
  "When paginating forwards, the cursor to continue."
  endCursor: String
  "Indicates whether more edges exist following the set defined by the clients arguments."
  hasNextPage: Boolean!
  "Indicates whether more edges exist prior the set defined by the clients arguments."
  hasPreviousPage: Boolean!
  "When paginating backwards, the cursor to continue."
  startCursor: String
}

type Payment implements Node {
  amount: Decimal!
  createdAt: DateTime!
  id: ID!
  order: Order!
  status: PaymentStatus!
}

type Product implements Node {
  deliveryEstimate(zip: String!): Int!
  dimension: ProductDimension!
  error: Int!
  id: ID!
  item: InventoryItem
    @cost(weight: "10")
  name: String!
  pictureFileName: String
  pictureUrl: URI
  price: Float!
  quantity: Int!
    @cost(weight: "10")
  reviews("Returns the elements in the list that come after the specified cursor." after: String "Returns the elements in the list that come before the specified cursor." before: String "Returns the first _n_ elements from the list." first: Int "Returns the last _n_ elements from the list." last: Int): ProductReviewsConnection
    @cost(weight: "10")
  weight: Int!
}

type ProductAmountCannotBeLowerThanOneError implements Error {
  message: String!
}

type ProductDimension {
  height: Float!
  length: Float!
  width: Float!
}

"A connection to a list of items."
type ProductReviewsConnection {
  "A list of edges."
  edges: [ProductReviewsEdge!]
  "A flattened list of the nodes."
  nodes: [Review!]
  "Information to aid in pagination."
  pageInfo: PageInfo!
}

"An edge in a connection."
type ProductReviewsEdge {
  "A cursor for use in pagination."
  cursor: String!
  "The item at the end of the edge."
  node: Review!
}

"A connection to a list of items."
type ProductsConnection {
  "A list of edges."
  edges: [ProductsEdge!]
  "A flattened list of the nodes."
  nodes: [Product!]
  "Information to aid in pagination."
  pageInfo: PageInfo!
}

"An edge in a connection."
type ProductsEdge {
  "A cursor for use in pagination."
  cursor: String!
  "The item at the end of the edge."
  node: Product!
}

type RemoveProductFromCartPayload {
  cart: Cart
  errors: [RemoveProductFromCartError!]
}

type RestockProductPayload {
  product: Product
}

type Review implements Node {
  author: User
    @cost(weight: "10")
  body: String!
  createAt: DateTime!
  id: ID!
  product: Product!
  stars: Int!
}

type UnknownProductError implements Error {
  message: String!
  productId: Int!
}

type UploadProductPicturePayload {
  errors: [UploadProductPictureError!]
  product: Product
}

type User implements Node {
  birthdate: DateTime!
  id: ID!
  name: String!
  reviews("Returns the elements in the list that come after the specified cursor." after: String "Returns the elements in the list that come before the specified cursor." before: String "Returns the first _n_ elements from the list." first: Int "Returns the last _n_ elements from the list." last: Int): UserReviewsConnection
    @cost(weight: "10")
  username: String!
}

"A connection to a list of items."
type UserReviewsConnection {
  "A list of edges."
  edges: [UserReviewsEdge!]
  "A flattened list of the nodes."
  nodes: [Review!]
  "Information to aid in pagination."
  pageInfo: PageInfo!
}

"An edge in a connection."
type UserReviewsEdge {
  "A cursor for use in pagination."
  cursor: String!
  "The item at the end of the edge."
  node: Review!
}

"A connection to a list of items."
type UsersConnection {
  "A list of edges."
  edges: [UsersEdge!]
  "A flattened list of the nodes."
  nodes: [User!]
  "Information to aid in pagination."
  pageInfo: PageInfo!
}

"An edge in a connection."
type UsersEdge {
  "A cursor for use in pagination."
  cursor: String!
  "The item at the end of the edge."
  node: User!
}

type Viewer {
  cart: Cart!
    @cost(weight: "10")
}

interface Error {
  message: String!
}

"The node interface is implemented by entities that have a global unique identifier."
interface Node {
  id: ID!
}

union AddProductToCartError = ProductAmountCannotBeLowerThanOneError

union RemoveProductFromCartError = ProductAmountCannotBeLowerThanOneError

union UploadProductPictureError = UnknownProductError

input AddProductToCartInput {
  productId: ID!
  quantity: Int!
}

input CreateOrderInput {
  items: [OrderItemInput!]!
  userId: ID!
  weight: Int!
}

input CreatePaymentInput {
  orderId: ID!
}

input CreateReviewInput {
  authorId: ID!
  body: String!
  productId: ID!
  stars: Int!
}

input OrderItemInput {
  price: Float!
  productId: ID!
  quantity: Int!
}

input ProductDimensionInput {
  height: Float!
  length: Float!
  weight: Int!
  width: Float!
}

input RemoveProductFromCartInput {
  productId: ID!
  quantity: Int!
}

input RestockProductInput {
  id: ID!
  quantity: Int!
}

input UploadProductPictureInput {
  picture: Upload!
  productId: Int!
}

enum PaymentStatus {
  AUTHORIZED
  DECLINED
  PENDING
  REFUNDED
}

enum ScalarSerializationType {
  BOOLEAN
  FLOAT
  INT
  LIST
  OBJECT
  STRING
}

"The `DateTime` scalar type represents a date and time with time zone offset information."
scalar DateTime
  @specifiedBy(url: "https://scalars.graphql.org/chillicream/date-time.html")

"The `Decimal` scalar type represents a decimal floating-point number with high precision."
scalar Decimal
  @specifiedBy(url: "https://scalars.graphql.org/chillicream/decimal.html")

"The `Upload` scalar type represents a file upload."
scalar Upload

"The `URI` scalar type represents a Uniform Resource Identifier (URI) as defined by RFC 3986."
scalar URI
  @specifiedBy(url: "https://scalars.graphql.org/chillicream/uri.html")

directive @cost(weight: String!) on SCALAR | OBJECT | FIELD_DEFINITION | ARGUMENT_DEFINITION | ENUM | INPUT_FIELD_DEFINITION
