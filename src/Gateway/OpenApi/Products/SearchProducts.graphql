query SearchProducts(
  $text: String!
  $minPrice: Float
  $maxPrice: Float
  $first: Int!
  $after: String
  $includeErrorField: Boolean = false
)
@http(
  method: GET
  route: "/products/search"
  queryParameters: [
    "text"
    "minPrice"
    "maxPrice"
    "first"
    "after"
    "includeErrorField"
  ]
) {
  products(
    searchText: $text
    minPrice: $minPrice
    maxPrice: $maxPrice
    first: $first
    after: $after
  ) {
    nodes {
      ...Product
      error @include(if: $includeErrorField)
    }
  }
}
