<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Basket</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 0;
            background: transparent;
            color: var(--text);
            line-height: 1.5;
        }
        :root {
            --text: #374151;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --primary: #10a37f;
            --primary-hover: #0d8a6b;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --surface: #ffffff;
            --surface-hover: #f9fafb;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --text: #ececec;
                --text-secondary: #9b9b9b;
                --border: #2f2f2f;
                --primary: #10a37f;
                --primary-hover: #0d8a6b;
                --danger: #ef4444;
                --danger-hover: #dc2626;
                --surface: #212121;
                --surface-hover: #2a2a2a;
            }
        }
        .cart-container {
            max-width: 600px;
        }
        .cart-summary {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .cart-summary h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .summary-row.total {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }
        .cart-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            gap: 12px;
        }
        .item-image {
            width: 80px;
            height: 80px;
            border-radius: 6px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            flex-shrink: 0;
        }
        .item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 6px;
        }
        .item-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .item-name {
            font-size: 16px;
            font-weight: 600;
        }
        .item-price {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .item-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }
        .quantity-display {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .checkout-btn {
            width: 100%;
            padding: 12px 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .checkout-btn:hover:not(:disabled) {
            background: var(--primary-hover);
        }
        .checkout-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .empty-cart {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        .empty-cart-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="cart" class="cart-container"></div>
    <script type="module">
        import { App, applyDocumentTheme, applyHostStyleVariables, applyHostFonts } from 'https://cdn.jsdelivr.net/npm/@modelcontextprotocol/ext-apps@1.1.2/dist/src/app-with-deps.js';

        let cartData = null;
        let isLoading = true;
        let app;

        function getCartFromResult(result) {
            const sc = result?.structuredContent;
            if (sc?.data?.viewer?.cart) return sc.data.viewer.cart;
            if (sc?.data?.shoppingBasket) return sc.data.shoppingBasket;
            if (sc?.viewer?.cart) return sc.viewer.cart;
            if (sc?.shoppingBasket) return sc.shoppingBasket;
            if (sc?.basket) return sc.basket;
            if (sc?.cart) return sc.cart;

            const text = result?.content?.find(c => c.type === 'text')?.text;
            if (text) {
                try {
                    const parsed = JSON.parse(text);
                    if (parsed?.data?.viewer?.cart) return parsed.data.viewer.cart;
                    if (parsed?.data?.shoppingBasket) return parsed.data.shoppingBasket;
                    if (parsed?.viewer?.cart) return parsed.viewer.cart;
                    if (parsed?.shoppingBasket) return parsed.shoppingBasket;
                    return parsed;
                } catch { /* not JSON */ }
            }

            return null;
        }

        function getProductEmoji(name) {
            const emojis = {
                'chair': '🪑', 'armchair': '🛋️', 'dining': '🍽️',
                'rocking': '🪑', 'table': '🪵', 'sofa': '🛋️',
                'couch': '🛋️', 'desk': '🪵', 'bed': '🛏️'
            };
            const lowerName = name.toLowerCase();
            for (const [key, emoji] of Object.entries(emojis)) {
                if (lowerName.includes(key)) return emoji;
            }
            return '🛒';
        }

        async function checkout() {
            const checkoutBtn = document.querySelector('.checkout-btn');
            if (!checkoutBtn || checkoutBtn.classList.contains('loading')) return;

            try {
                checkoutBtn.classList.add('loading');
                checkoutBtn.disabled = true;
                checkoutBtn.innerHTML = '<span class="spinner"></span>Processing...';

                await app.callServerTool({ name: 'Checkout', arguments: {} });

                checkoutBtn.classList.remove('loading');
                checkoutBtn.innerHTML = '✓ Order Placed!';

                setTimeout(() => {
                    cartData = null;
                    render();
                }, 1500);
            } catch {
                checkoutBtn.classList.remove('loading');
                checkoutBtn.innerHTML = '✗ Checkout Failed';
                checkoutBtn.style.background = '#dc2626';

                setTimeout(() => {
                    checkoutBtn.disabled = false;
                    checkoutBtn.style.background = '';
                    checkoutBtn.innerHTML = 'Checkout';
                }, 2000);
            }
        }

        // Make checkout available globally for onclick handler
        window.checkout = checkout;

        function render() {
            const container = document.getElementById('cart');
            if (!container) return;

            if (isLoading) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <span class="spinner"></span>
                        <p style="margin-top: 16px;">Loading cart...</p>
                    </div>
                `;
                return;
            }

            const items = cartData?.items?.nodes || cartData?.items || [];

            if (!cartData || items.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <div class="empty-cart-icon">🛒</div>
                        <h3>Your cart is empty</h3>
                        <p style="margin-top: 8px;">Add some products to get started!</p>
                    </div>
                `;
                return;
            }

            const subtotal = items.reduce((sum, item) =>
                sum + (item.product.price * item.quantity), 0);

            container.innerHTML = `
                <div class="cart-summary">
                    <h2>🛒 Shopping Basket</h2>
                    <div class="summary-row">
                        <span>Items:</span>
                        <span>${items.reduce((sum, item) => sum + item.quantity, 0)}</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total:</span>
                        <span>$${subtotal.toFixed(2)}</span>
                    </div>
                </div>

                <div class="cart-items">
                    ${items.map(item => `
                        <div class="cart-item" data-item-id="${item.product.id}">
                            <div class="item-image" style="${item.product.pictureUrl ? 'background: none; padding: 0;' : ''}">
                                ${item.product.pictureUrl
                                    ? `<img src="${item.product.pictureUrl}" alt="${item.product.name}">`
                                    : getProductEmoji(item.product.name)}
                            </div>
                            <div class="item-details">
                                <div class="item-name">${item.product.name}</div>
                                <div class="item-price">$${item.product.price.toFixed(2)} each</div>
                                <div class="item-controls">
                                    <span class="quantity-display">Qty: ${item.quantity}</span>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>

                <button class="checkout-btn" onclick="checkout()">
                    Checkout
                </button>
            `;
        }

        function applyHostContext(ctx) {
            if (ctx.theme) applyDocumentTheme(ctx.theme);
            if (ctx.styles?.variables) applyHostStyleVariables(ctx.styles.variables);
            if (ctx.styles?.css?.fonts) applyHostFonts(ctx.styles.css.fonts);
        }

        // Create the MCP App instance
        app = new App({ name: 'ViewShoppingBasket', version: '1.0.0' });

        // Register handlers before connecting
        app.ontoolresult = (result) => {
            cartData = getCartFromResult(result);
            isLoading = false;
            render();
        };

        app.onhostcontextchanged = applyHostContext;

        app.onteardown = async () => {
            return {};
        };

        // Initial render (loading state)
        render();

        // Connect to the host
        await app.connect();

        // Apply initial host context
        const ctx = app.getHostContext();
        if (ctx) applyHostContext(ctx);
    </script>
</body>
</html>
