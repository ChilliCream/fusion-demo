name: Build

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Build Backend
    runs-on: ubuntu-latest
    environment: ${{ vars.DEPLOY_ENVIRONMENT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Export Source Schemas
        run: |
          for project in Accounts Cart Inventory Order Payments Products Reviews Shipping; do
            dotnet run --project "src/SourceSchemas/$project" --no-build -c Release -- schema export
          done

      - name: Validate GraphQL schema
        uses: ChilliCream/nitro-fusion-validate@v16.0.0-rc.1.32
        with:
          source-schema-files: |
            src/SourceSchemas/Accounts/schema.graphqls
            src/SourceSchemas/Cart/schema.graphqls
            src/SourceSchemas/Inventory/schema.graphqls
            src/SourceSchemas/Order/schema.graphqls
            src/SourceSchemas/Payments/schema.graphqls
            src/SourceSchemas/Products/schema.graphqls
            src/SourceSchemas/Reviews/schema.graphqls
            src/SourceSchemas/Shipping/schema.graphqls
          stage: ${{ vars.NITRO_STAGE }}
          api-id: ${{ vars.NITRO_GATEWAY_API_ID }}
          api-key: ${{ secrets.NITRO_API_KEY }}
          cloud-url: ${{ secrets.NITRO_CLOUD_URL }}
          comment-mode: "review"

      - name: Validate MCP documents
        uses: ChilliCream/nitro-mcp-validate@v16.0.0-rc.1.32
        with:
          mcp-feature-collection-id: ${{ vars.NITRO_MCP_FEATURE_COLLECTION_ID }}
          prompt-patterns: src/Gateway/Mcp/Prompts/*/*.json
          tool-patterns: src/Gateway/Mcp/Tools/*/*.graphql
          stage: ${{ vars.NITRO_STAGE }}
          api-key: ${{ secrets.NITRO_API_KEY }}
          cloud-url: ${{ secrets.NITRO_CLOUD_URL }}
          comment-mode: "review"

      - name: Validate OpenAPI documents
        uses: ChilliCream/nitro-openapi-validate@v16.0.0-rc.1.32
        with:
          openapi-collection-id: ${{ vars.NITRO_OPENAPI_COLLECTION_ID }}
          patterns: src/Gateway/OpenApi/*.graphql
          stage: ${{ vars.NITRO_STAGE }}
          api-key: ${{ secrets.NITRO_API_KEY }}
          cloud-url: ${{ secrets.NITRO_CLOUD_URL }}
          comment-mode: "review"

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    environment: ${{ vars.DEPLOY_ENVIRONMENT }}

    defaults:
      run:
        working-directory: src/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: src/frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Persist Relay operations
        run: yarn relay:persist
        env:
          VITE_ENABLE_PERSISTED_OPERATIONS: "true"

      - name: Validate Client
        uses: ChilliCream/nitro-client-validate@v16.0.0-rc.1.32
        with:
          client-id: ${{ vars.NITRO_FRONTEND_CLIENT_ID }}
          operations-file: src/frontend/operations.json
          stage: ${{ vars.NITRO_STAGE }}
          api-key: ${{ secrets.NITRO_API_KEY }}
          cloud-url: ${{ secrets.NITRO_CLOUD_URL }}
          comment-mode: "review"
