name: OpenAPI Collections Release

on:
  push:
    branches: [main]
    paths:
      - "src/Gateway/OpenApi/**"
      - ".github/workflows/deploy-openapi-collections.yml"
  workflow_dispatch: {}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Compute tag
        id: meta
        run: |
          TS=$(date -u +'%Y%m%dT%H%M%SZ')
          SHORTSHA=${GITHUB_SHA::7}
          echo "tag=${TS}-${SHORTSHA}" >> $GITHUB_OUTPUT

  upload:
    name: Upload ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: prepare
    environment: ${{ vars.DEPLOY_ENVIRONMENT }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Shared
            collection-id: NITRO_OPENAPI_SHARED_COLLECTION_ID
            patterns: src/Gateway/OpenApi/Shared/*.graphql
          - name: Inventory
            collection-id: NITRO_OPENAPI_INVENTORY_COLLECTION_ID
            patterns: src/Gateway/OpenApi/Inventory/*.graphql
          - name: Products
            collection-id: NITRO_OPENAPI_COLLECTION_ID
            patterns: src/Gateway/OpenApi/Products/*.graphql
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload OpenAPI collection (${{ matrix.name }})
        uses: ChilliCream/nitro-openapi-upload@v16.0.1-p.6
        with:
          openapi-collection-id: ${{ vars[matrix.collection-id] }}
          patterns: ${{ matrix.patterns }}
          tag: ${{ needs.prepare.outputs.tag }}
          api-key: ${{ secrets.NITRO_API_KEY }}
          cloud-url: ${{ secrets.NITRO_CLOUD_URL }}

  deploy:
    name: Deploy ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: [prepare, upload]
    environment: ${{ vars.DEPLOY_ENVIRONMENT }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Shared
            collection-id: NITRO_OPENAPI_SHARED_COLLECTION_ID
          - name: Inventory
            collection-id: NITRO_OPENAPI_INVENTORY_COLLECTION_ID
          - name: Products
            collection-id: NITRO_OPENAPI_COLLECTION_ID
    concurrency:
      group: deploy-openapi-collections-${{ matrix.name }}
      cancel-in-progress: false
    steps:
      - name: Publish OpenAPI collection (${{ matrix.name }})
        uses: ChilliCream/nitro-openapi-publish@v16.0.1-p.6
        with:
          openapi-collection-id: ${{ vars[matrix.collection-id] }}
          tag: ${{ needs.prepare.outputs.tag }}
          stage: ${{ vars.NITRO_STAGE }}
          api-key: ${{ secrets.NITRO_API_KEY }}
          cloud-url: ${{ secrets.NITRO_CLOUD_URL }}
          force: true
