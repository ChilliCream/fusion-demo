name: MCP Collection Release

on:
  push:
    branches: [main]
    paths:
      - "src/Gateway/Mcp/**"
      - ".github/workflows/deploy-mcp-collection.yml"
  workflow_dispatch: {}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Compute tag
        id: meta
        run: |
          TS=$(date -u +'%Y%m%dT%H%M%SZ')
          SHORTSHA=${GITHUB_SHA::7}
          echo "tag=${TS}-${SHORTSHA}" >> $GITHUB_OUTPUT

  upload:
    runs-on: ubuntu-latest
    needs: prepare
    environment: ${{ vars.DEPLOY_ENVIRONMENT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload MCP Feature Collection
        uses: ChilliCream/nitro-mcp-upload@v16.0.0-rc.1.32
        with:
          mcp-feature-collection-id: ${{ vars.NITRO_MCP_FEATURE_COLLECTION_ID }}
          prompt-patterns: src/Gateway/Mcp/Prompts/*/*.json
          tool-patterns: src/Gateway/Mcp/Tools/*/*.graphql
          tag: ${{ needs.prepare.outputs.tag }}
          api-key: ${{ secrets.NITRO_API_KEY }}
          cloud-url: ${{ secrets.NITRO_CLOUD_URL }}

  deploy:
    runs-on: ubuntu-latest
    needs: [prepare, upload]
    environment: ${{ vars.DEPLOY_ENVIRONMENT }}
    concurrency:
      group: deploy-mcp-collection
      cancel-in-progress: false
    steps:
      - name: Publish MCP Feature Collection
        uses: ChilliCream/nitro-mcp-publish@v16.0.0-rc.1.32
        with:
          mcp-feature-collection-id: ${{ vars.NITRO_MCP_FEATURE_COLLECTION_ID }}
          tag: ${{ needs.prepare.outputs.tag }}
          stage: ${{ vars.NITRO_STAGE }}
          api-key: ${{ secrets.NITRO_API_KEY }}
          cloud-url: ${{ secrets.NITRO_CLOUD_URL }}
          force: true
