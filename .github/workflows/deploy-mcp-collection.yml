name: MCP Collection Release

on:
  push:
    branches: [main]
    paths:
      - "src/Gateway/Mcp/**"
      - ".github/workflows/deploy-mcp-collection.yml"
  workflow_dispatch: {}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Compute tag
        id: meta
        run: |
          TS=$(date -u +'%Y%m%dT%H%M%SZ')
          SHORTSHA=${GITHUB_SHA::7}
          echo "tag=${TS}-${SHORTSHA}" >> $GITHUB_OUTPUT

  upload:
    name: Upload ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: prepare
    environment: ${{ vars.DEPLOY_ENVIRONMENT }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Products
            collection-id: NITRO_MCP_FEATURE_COLLECTION_ID
            prompt-patterns: src/Gateway/Mcp/Products/Prompts/*/*.json
            tool-patterns: src/Gateway/Mcp/Products/Tools/*/*.graphql
          - name: Inventory
            collection-id: NITRO_MCP_INVENTORY_FEATURE_COLLECTION_ID
            prompt-patterns: src/Gateway/Mcp/Inventory/Prompts/*/*.json
            tool-patterns: src/Gateway/Mcp/Inventory/Tools/*/*.graphql
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload MCP Feature Collection (${{ matrix.name }})
        uses: ChilliCream/nitro-mcp-upload@v16.0.1-p.5
        with:
          mcp-feature-collection-id: ${{ vars[matrix.collection-id] }}
          prompt-patterns: ${{ matrix.prompt-patterns }}
          tool-patterns: ${{ matrix.tool-patterns }}
          tag: ${{ needs.prepare.outputs.tag }}
          api-key: ${{ secrets.NITRO_API_KEY }}
          cloud-url: ${{ secrets.NITRO_CLOUD_URL }}

  deploy:
    name: Deploy ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: [prepare, upload]
    environment: ${{ vars.DEPLOY_ENVIRONMENT }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Products
            collection-id: NITRO_MCP_FEATURE_COLLECTION_ID
          - name: Inventory
            collection-id: NITRO_MCP_INVENTORY_FEATURE_COLLECTION_ID
    concurrency:
      group: deploy-mcp-collection-${{ matrix.name }}
      cancel-in-progress: false
    steps:
      - name: Publish MCP Feature Collection (${{ matrix.name }})
        uses: ChilliCream/nitro-mcp-publish@v16.0.1-p.5
        with:
          mcp-feature-collection-id: ${{ vars[matrix.collection-id] }}
          tag: ${{ needs.prepare.outputs.tag }}
          stage: ${{ vars.NITRO_STAGE }}
          api-key: ${{ secrets.NITRO_API_KEY }}
          cloud-url: ${{ secrets.NITRO_CLOUD_URL }}
          force: true
