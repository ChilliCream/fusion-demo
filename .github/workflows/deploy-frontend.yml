name: Frontend Release

on:
  push:
    branches: [main]
    paths:
      - "src/frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch: {}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Compute image tag
        id: meta
        run: |
          TS=$(date -u +'%Y%m%dT%H%M%SZ')
          SHORTSHA=${GITHUB_SHA::7}
          echo "tag=${TS}-${SHORTSHA}" >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    needs: prepare
    env:
      FRONTEND_DOCKER_IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/ccc-eu1-demo-ca-frontend:${{ needs.prepare.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        working-directory: src/frontend
        run: |
          docker build \
            --build-arg "VITE_GRAPHQL_ENDPOINT=${{ vars.GRAPHQL_ENDPOINT }}" \
            --build-arg "VITE_GRAPHQL_CLIENT_ID=${{ secrets.CLIENT_ID }}" \
            --build-arg "VITE_GRAPHQL_CLIENT_VERSION=${{ needs.prepare.outputs.tag }}" \
            --build-arg "VITE_ENABLE_PERSISTED_OPERATIONS=true" \
            -t "$FRONTEND_DOCKER_IMAGE" \
            .
          docker push "$FRONTEND_DOCKER_IMAGE"

      - name: Extract persisted operations from image
        working-directory: src/frontend
        run: |
          docker build \
            --build-arg "VITE_GRAPHQL_ENDPOINT=${{ vars.GRAPHQL_ENDPOINT }}" \
            --build-arg "VITE_GRAPHQL_CLIENT_ID=${{ secrets.CLIENT_ID }}" \
            --build-arg "VITE_GRAPHQL_CLIENT_VERSION=${{ needs.prepare.outputs.tag }}" \
            --build-arg "VITE_ENABLE_PERSISTED_OPERATIONS=true" \
            --target operations \
            --output type=local,dest=. \
            .

      - name: Upload Nitro client operations
        uses: ChilliCream/nitro-client-upload@v16.0.0-rc.1.29
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          operations-file: src/frontend/operations.json
          client-id: ${{ secrets.CLIENT_ID }}
          api-key: ${{ secrets.NITRO_API_KEY }}

  deploy:
    runs-on: ubuntu-latest
    needs: [prepare, build]
    concurrency:
      group: deploy-frontend
      cancel-in-progress: false
    env:
      FRONTEND_DOCKER_IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/ccc-eu1-demo-ca-frontend:${{ needs.prepare.outputs.tag }}

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Publish Nitro client
        uses: ChilliCream/nitro-client-publish@v16.0.0-rc.1.29
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          stage: dev
          client-id: ${{ secrets.CLIENT_ID }}
          api-key: ${{ secrets.NITRO_API_KEY }}
          force: true

      - name: Create or Update App Service
        run: |
          # Create the web app if it doesn't exist
          if ! az webapp show --name ccc-eu1-demo-ca-frontend --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} &> /dev/null; then
            echo "Creating new App Service: ccc-eu1-demo-ca-frontend"
            az webapp create \
              --name ccc-eu1-demo-ca-frontend \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --plan ${{ secrets.APP_SERVICE_PLAN }} \
              --deployment-container-image-name "$FRONTEND_DOCKER_IMAGE"
          fi

          # Configure container settings
          az webapp config container set \
            --name ccc-eu1-demo-ca-frontend \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --container-image-name "$FRONTEND_DOCKER_IMAGE" \
            --container-registry-url https://${{ secrets.ACR_LOGIN_SERVER }} \
            --container-registry-user ${{ secrets.ACR_USERNAME }} \
            --container-registry-password ${{ secrets.ACR_PASSWORD }}

          # Configure the exposed port
          az webapp config appsettings set \
            --name ccc-eu1-demo-ca-frontend \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --settings WEBSITES_PORT=8080

          # Enable continuous deployment from ACR
          az webapp deployment container config \
            --name ccc-eu1-demo-ca-frontend \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --enable-cd true

          # Restart the app to apply changes
          az webapp restart \
            --name ccc-eu1-demo-ca-frontend \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}
