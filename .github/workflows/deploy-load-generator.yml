name: Load Generator Release

on:
  push:
    branches: [main]
    paths:
      - "src/LoadGenerator/**"
      - "src/Defaults/**"
      - ".github/workflows/deploy-load-generator.yml"
      - "Directory.Packages.props"
  workflow_dispatch: {}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Compute image tag
        id: meta
        run: |
          TS=$(date -u +'%Y%m%dT%H%M%SZ')
          SHORTSHA=${GITHUB_SHA::7}
          echo "tag=${TS}-${SHORTSHA}" >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login (for dotnet publish push)
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # Build .NET app and publish directly to an OCI image, then push to ACR.
      - name: dotnet publish -> container (push to ACR)
        working-directory: src/LoadGenerator
        run: |
          dotnet restore
          dotnet publish -c Release \
            -p:ContainerRepository=ccc-eu1-demo-ca-load-generator \
            -p:ContainerImageTag=${{ needs.prepare.outputs.tag }} \
            -p:ContainerRegistry=${{ secrets.ACR_LOGIN_SERVER }} \
            -p:RuntimeIdentifier=linux-x64

  deploy:
    runs-on: ubuntu-latest
    needs: [prepare, build]
    environment: ${{ vars.DEPLOY_ENVIRONMENT }}
    concurrency:
      group: deploy-load-generator
      cancel-in-progress: false

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create or Update App Service
        run: |
          # Create the web app if it doesn't exist
          if ! az webapp show --name ccc-eu1-demo-ca-load-generator --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} &> /dev/null; then
            echo "Creating new App Service: ccc-eu1-demo-ca-load-generator"
            az webapp create \
              --name ccc-eu1-demo-ca-load-generator \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --plan ${{ secrets.APP_SERVICE_PLAN }} \
              --deployment-container-image-name ${{ secrets.ACR_LOGIN_SERVER }}/ccc-eu1-demo-ca-load-generator:${{ needs.prepare.outputs.tag }}
          fi

          # Configure container settings
          az webapp config container set \
            --name ccc-eu1-demo-ca-load-generator \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --container-image-name ${{ secrets.ACR_LOGIN_SERVER }}/ccc-eu1-demo-ca-load-generator:${{ needs.prepare.outputs.tag }} \
            --container-registry-url https://${{ secrets.ACR_LOGIN_SERVER }} \
            --container-registry-user ${{ secrets.ACR_USERNAME }} \
            --container-registry-password ${{ secrets.ACR_PASSWORD }}

          # Enable continuous deployment from ACR
          az webapp deployment container config \
            --name ccc-eu1-demo-ca-load-generator \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --enable-cd true

          # Configure app settings
          az webapp config appsettings set \
            --name ccc-eu1-demo-ca-load-generator \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --settings \
              ASPNETCORE_ENVIRONMENT=Production \
              ASPNETCORE_URLS=http://+:8080 \
              NITRO_API_ID=${{ vars.NITRO_LOAD_GENERATOR_API_ID }} \
              NITRO_API_KEY=${{ secrets.NITRO_API_KEY }} \
              NITRO_STAGE=${{ vars.NITRO_STAGE }} \
              NITRO_URL=${{ secrets.NITRO_CLOUD_URL }} \
              NITRO_OTEL_URL=${{ secrets.NITRO_OTEL_URL }} \
              LoadGenerator__GraphQL__ClientId=${{ vars.NITRO_LOAD_GENERATOR_API_ID }} \
              LoadGenerator__GraphQL__ClientVersion=v1

          # Restart the app to apply changes
          az webapp restart \
            --name ccc-eu1-demo-ca-load-generator \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}
